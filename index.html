<!DOCTYPE html><html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>생존 회피 게임</title>
  <style>
    body {
      margin: 0;
      background: #111;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }canvas {
  background: black;
  border: 6px solid #2d6cff;
  box-shadow: 0 0 20px #2d6cff;
}

  </style>
</head>
<body>
  <canvas id="game" width="900" height="600"></canvas>  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");

    const keys = {};

    document.addEventListener("keydown", (e) => {
      keys[e.key.toLowerCase()] = true;
    });

    document.addEventListener("keyup", (e) => {
      keys[e.key.toLowerCase()] = false;
    });

    const player = {
      x: canvas.width / 2,
      y: canvas.height / 2,
      radius: 15,
      speed: 5,
      hp: 100
    };

    let bullets = [];
    let countdown = 3;
    let gameStarted = false;
    let gameOver = false;
    let win = false;

    let survivalTime = 60;

    // 총알 생성
    function spawnBullet() {
      const side = Math.floor(Math.random() * 4);

      let x, y, vx, vy;

      const speed = 2 + Math.random() * 4;

      if (side === 0) {
        // 위
        x = Math.random() * canvas.width;
        y = -20;
        vx = (Math.random() - 0.5) * 3;
        vy = speed;
      } else if (side === 1) {
        // 오른쪽
        x = canvas.width + 20;
        y = Math.random() * canvas.height;
        vx = -speed;
        vy = (Math.random() - 0.5) * 3;
      } else if (side === 2) {
        // 아래
        x = Math.random() * canvas.width;
        y = canvas.height + 20;
        vx = (Math.random() - 0.5) * 3;
        vy = -speed;
      } else {
        // 왼쪽
        x = -20;
        y = Math.random() * canvas.height;
        vx = speed;
        vy = (Math.random() - 0.5) * 3;
      }

      bullets.push({
        x,
        y,
        radius: 10,
        vx,
        vy
      });
    }

    // 카운트다운
    const countdownInterval = setInterval(() => {
      countdown--;

      if (countdown <= 0) {
        gameStarted = true;
        clearInterval(countdownInterval);

        // 공격 생성 시작
        setInterval(() => {
          if (!gameOver && !win) {
            for (let i = 0; i < 3; i++) {
              spawnBullet();
            }
          }
        }, 500);

        // 1분 생존 타이머
        const timer = setInterval(() => {
          if (!gameOver) {
            survivalTime--;
          }

          if (survivalTime <= 0) {
            win = true;
            clearInterval(timer);
          }
        }, 1000);
      }
    }, 1000);

    function update() {
      if (gameOver || win || !gameStarted) return;

      // 이동
      if (keys["w"]) player.y -= player.speed;
      if (keys["s"]) player.y += player.speed;
      if (keys["a"]) player.x -= player.speed;
      if (keys["d"]) player.x += player.speed;

      // 벽 데미지
      const border = 6;

      if (player.x - player.radius <= border ||
          player.x + player.radius >= canvas.width - border ||
          player.y - player.radius <= border ||
          player.y + player.radius >= canvas.height - border) {
        player.hp -= 0.2;
      }

      // 맵 밖 제한
      player.x = Math.max(player.radius, Math.min(canvas.width - player.radius, player.x));
      player.y = Math.max(player.radius, Math.min(canvas.height - player.radius, player.y));

      // 총알 이동
      bullets.forEach((bullet) => {
        bullet.x += bullet.vx;
        bullet.y += bullet.vy;

        // 충돌 판정
        const dx = bullet.x - player.x;
        const dy = bullet.y - player.y;
        const dist = Math.sqrt(dx * dx + dy * dy);

        if (dist < bullet.radius + player.radius) {
          player.hp -= 8;

          bullet.x = -9999;
        }
      });

      // 화면 밖 총알 제거
      bullets = bullets.filter(
        (b) =>
          b.x > -100 &&
          b.x < canvas.width + 100 &&
          b.y > -100 &&
          b.y < canvas.height + 100
      );

      // 게임 오버
      if (player.hp <= 0) {
        player.hp = 0;
        gameOver = true;
      }
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // 플레이어
      ctx.beginPath();
      ctx.fillStyle = "white";
      ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2);
      ctx.fill();

      // 총알
      bullets.forEach((bullet) => {
        ctx.beginPath();
        ctx.fillStyle = "red";
        ctx.arc(bullet.x, bullet.y, bullet.radius, 0, Math.PI * 2);
        ctx.fill();
      });

      // HP 바
      ctx.fillStyle = "gray";
      ctx.fillRect(20, 20, 200, 20);

      ctx.fillStyle = "lime";
      ctx.fillRect(20, 20, player.hp * 2, 20);

      ctx.strokeStyle = "white";
      ctx.strokeRect(20, 20, 200, 20);

      // 텍스트
      ctx.fillStyle = "white";
      ctx.font = "28px Arial";

      if (!gameStarted) {
        ctx.fillText(`시작까지: ${countdown}`, canvas.width / 2 - 80, canvas.height / 2);
      } else {
        ctx.fillText(`남은 시간: ${survivalTime}`, canvas.width - 230, 40);
      }

      if (gameOver) {
        ctx.fillStyle = "red";
        ctx.font = "60px Arial";
        ctx.fillText("GAME OVER", canvas.width / 2 - 190, canvas.height / 2);
      }

      if (win) {
        ctx.fillStyle = "cyan";
        ctx.font = "60px Arial";
        ctx.fillText("CLEAR!", canvas.width / 2 - 120, canvas.height / 2);
      }
    }

    function gameLoop() {
      update();
      draw();
      requestAnimationFrame(gameLoop);
    }

    gameLoop();
  </script></body>
</html>
