<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Roguelike Full</title>

<style>
html,body{
margin:0;
padding:0;
overflow:hidden;
background:#000;
touch-action:none;
font-family:Arial;
}

#ui{
position:fixed;
top:10px;
left:10px;
color:white;
z-index:10;
font-size:14px;
}

#hp{
width:120px;
height:10px;
background:#333;
border-radius:10px;
overflow:hidden;
display:inline-block;
vertical-align:middle;
}

#hp-bar{
height:100%;
width:100%;
background:red;
}

canvas{
display:block;
margin:0 auto;
background:#000;
}
</style>
</head>

<body>

<div id="ui">
TIME: <span id="time">0</span> |
<div id="hp"><div id="hp-bar"></div></div>
</div>

<canvas id="c"></canvas>

<script>

const c=document.getElementById("c");
const ctx=c.getContext("2d");

function resize(){
c.width=window.innerWidth;
c.height=window.innerHeight;
player.x=c.width/2;
player.y=c.height/2;
}
window.addEventListener("resize",resize);

// ================= PLAYER =================
let player={
x:0,y:0,r:10,hp:200,maxHp:200,speed:1
};
resize();

// ================= GAME =================
let bullets=[];
let runTime=0;
let spawn=0;

// ================= CARD SYSTEM =================
let deck=[];
let hand=[];
let cardUI=false;
let timeStop=false;
let cardTimer=0;

// ================= INIT DECK =================
function createDeck(){
return [
"HP","HP","HP","DEF","FAST","SHIELD","REVIVE",
"SLOW","BOOST","DOT","ENEMY","HP40","HP80"
];
}

function initDeck(){
deck=createDeck();
}
initDeck();

// ================= DRAW CARDS =================
function drawCards(){
hand=[];
for(let i=0;i<3;i++){
if(deck.length===0)initDeck();
let i2=Math.floor(Math.random()*deck.length);
hand.push(deck[i2]);
deck.splice(i2,1);
}
}

// ================= APPLY CARD =================
function applyCard(c){

switch(c){

case "HP": player.hp+=30;break;
case "HP40": player.hp+=80;break;
case "HP80": player.hp+=160;break;

case "DEF": player.def=1;break;
case "FAST": player.speed*=1.2;break;

case "SHIELD": player.inv=120;break;

case "REVIVE":
if(player.hp<=0) player.hp=60;
break;

case "SLOW": timeSlow=true;break;
case "BOOST": regen=true;break;

case "DOT": player.hp-=20;break;
case "ENEMY": enemyBoost=true;break;
}
}

// ================= TOUCH =================
let drag=false,lx=0,ly=0;

c.addEventListener("touchstart",e=>{
drag=true;
let t=e.touches[0];
lx=t.clientX;ly=t.clientY;
});

window.addEventListener("touchmove",e=>{
if(!drag)return;
let t=e.touches[0];

player.x+=t.clientX-lx;
player.y+=t.clientY-ly;

lx=t.clientX;ly=t.clientY;
});

window.addEventListener("touchend",()=>drag=false);

// ================= BULLETS =================
function spawnBullet(){
let x=Math.random()*c.width;
let y=0;

let angle=Math.atan2(player.y-y,player.x-x);
let speed=2+runTime*0.02;

bullets.push({
x,y,
vx:Math.cos(angle)*speed,
vy:Math.sin(angle)*speed,
r:4
});
}

// ================= UPDATE =================
function update(){

runTime+=1/60;
spawn++;

cardTimer+=1/60;

// 카드 이벤트
if(cardTimer>20 && !cardUI){
cardTimer=0;
cardUI=true;
timeStop=true;
drawCards();
}

// 탄막
if(!timeStop){
if(spawn%30===0)spawnBullet();
}

// 플레이어 제한
player.x=Math.max(0,Math.min(c.width,player.x));
player.y=Math.max(0,Math.min(c.height,player.y));

// 탄막 이동
for(let b of bullets){
b.x+=b.vx;
b.y+=b.vy;

if(Math.hypot(b.x-player.x,b.y-player.y)<10){
player.hp-=10;
}
}

bullets=bullets.filter(b=>b.x>-100&&b.x<c.width+100);
}

// ================= DRAW =================
function draw(){

ctx.clearRect(0,0,c.width,c.height);

// PLAYER
ctx.fillStyle="white";
ctx.beginPath();
ctx.arc(player.x,player.y,10,0,Math.PI*2);
ctx.fill();

// BULLETS
ctx.fillStyle="red";
for(let b of bullets){
ctx.beginPath();
ctx.arc(b.x,b.y,b.r,0,Math.PI*2);
ctx.fill();
}

// CARD UI
if(cardUI){
ctx.fillStyle="rgba(0,0,0,0.8)";
ctx.fillRect(0,0,c.width,c.height);

ctx.fillStyle="white";
ctx.fillText("CHOOSE CARD",c.width/2-50,c.height/2-60);

for(let i=0;i<hand.length;i++){
let x=c.width/2-100+i*100;
let y=c.height/2;

ctx.strokeStyle="cyan";
ctx.strokeRect(x-30,y-30,60,60);

ctx.fillText(hand[i],x-10,y);
}
}
}

// ================= INPUT CARD =================
window.addEventListener("touchstart",e=>{
if(!cardUI)return;

let t=e.touches[0];

for(let i=0;i<hand.length;i++){
let x=c.width/2-100+i*100;
let y=c.height/2;

if(Math.abs(t.clientX-x)<50 && Math.abs(t.clientY-y)<50){
applyCard(hand[i]);
cardUI=false;
timeStop=false;
}
}
});

// ================= LOOP =================
function loop(){
update();
draw();

document.getElementById("time").innerText=runTime.toFixed(1);
document.getElementById("hp-bar").style.width=
(player.hp/player.maxHp*100)+"%";

requestAnimationFrame(loop);
}

loop();

</script>
</body>
</html>
