<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Survival Roguelike</title>

<style>
html,body{
margin:0;
padding:0;
overflow:hidden;
background:#000;
touch-action:none;
font-family:Arial;
}

#ui{
position:fixed;
top:10px;
left:10px;
color:white;
z-index:10;
font-size:14px;
}

#arena{
position:absolute;
border:3px solid #00f0ff;
box-shadow:0 0 20px #00f0ff;
}

#card-ui{
position:fixed;
bottom:10%;
width:100%;
display:none;
justify-content:center;
gap:10px;
z-index:20;
}

.card{
width:30%;
height:200px;
border-radius:15px;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
font-weight:bold;
color:black;
box-shadow:0 0 20px;
}

#timer-bar{
position:fixed;
top:40px;
left:10px;
width:200px;
height:10px;
background:#333;
z-index:10;
}

#bar{
height:100%;
width:100%;
background:linear-gradient(90deg,#00ffcc,#ff00ff);
}

canvas{
display:block;
}
</style>
</head>

<body>

<div id="ui">
TIME: <span id="t">0</span>
</div>

<div id="timer-bar"><div id="bar"></div></div>

<div id="card-ui"></div>

<canvas id="c"></canvas>

<script>

const c=document.getElementById("c");
const ctx=c.getContext("2d");

function resize(){
c.width=window.innerWidth;
c.height=window.innerHeight;
player.x=c.width/2;
player.y=c.height/2;
updateArena();
}
window.addEventListener("resize",resize);

// ================= PLAYER =================
let player={
x:0,y:0,r:10,hp:200,maxHp:200
};
resize();

// ================= ARENA =================
let ARENA={x:0,y:0,size:0};

function updateArena(){
ARENA.size = Math.min(c.width,c.height)*0.7;
ARENA.x = c.width/2 - ARENA.size/2;
ARENA.y = c.height/2 - ARENA.size/2;
}

// ================= GAME =================
let bullets=[];
let runTime=0;
let spawn=0;

// ================= CARD =================
let cardState=false;
let cardTime=0;
let cardMax=10;
let hand=[];

// ================= TOUCH =================
let drag=false,lx=0,ly=0;

c.addEventListener("touchstart",e=>{
drag=true;
let t=e.touches[0];
lx=t.clientX;ly=t.clientY;
});

window.addEventListener("touchmove",e=>{
if(!drag||cardState)return;

let t=e.touches[0];
player.x+=t.clientX-lx;
player.y+=t.clientY-ly;

lx=t.clientX;ly=t.clientY;
});

window.addEventListener("touchend",()=>drag=false);

// ================= CLAMP =================
function clamp(){
player.x=Math.max(ARENA.x+player.r,Math.min(ARENA.x+ARENA.size-player.r,player.x));
player.y=Math.max(ARENA.y+player.r,Math.min(ARENA.y+ARENA.size-player.r,player.y));
}

// ================= BULLET =================
function spawnBullet(){
let x=Math.random()*c.width;
let y=-10;

let a=Math.atan2(player.y-y,player.x-x);

let speed=2+runTime*0.02;

bullets.push({
x,y,
vx:Math.cos(a)*speed,
vy:Math.sin(a)*speed,
r:4
});
}

// ================= CARD SYSTEM =================
function createCards(){
let pool=[
{t:"HP",c:"#00ff66",d:"체력 회복"},
{t:"HP2",c:"#00ccff",d:"중간 회복"},
{t:"HP3",c:"#cc66ff",d:"대량 회복"},
{t:"SHIELD",c:"#0099ff",d:"2초 무적"},
{t:"FAST",c:"#00ff99",d:"이속 증가"},
{t:"SLOW",c:"#aa00ff",d:"시간 느림"}
];

hand=[];
for(let i=0;i<3;i++){
hand.push(pool[Math.floor(Math.random()*pool.length)]);
}
}

function openCard(){
cardState=true;
cardTime=0;

createCards();

let ui=document.getElementById("card-ui");
ui.style.display="flex";
ui.innerHTML="";

hand.forEach(c=>{
let d=document.createElement("div");
d.className="card";
d.style.background=c.c;

d.innerHTML=`
<div>${c.t}</div>
<div style="font-size:12px">${c.d}</div>
`;

d.onclick=()=>{
applyCard(c);
closeCard();
};

ui.appendChild(d);
});
}

function closeCard(){
cardState=false;
document.getElementById("card-ui").style.display="none";
}

// ================= APPLY =================
function applyCard(c){
switch(c.t){
case "HP":player.hp+=40;break;
case "HP2":player.hp+=80;break;
case "HP3":player.hp+=160;break;
case "SHIELD":player.inv=120;break;
case "FAST":player.speed=1.2;break;
case "SLOW":timeSlow=true;break;
}
}

// ================= LOOP =================
function update(){

runTime+=1/60;
spawn++;

// 카드 이벤트
if(!cardState){
cardTime+=1/60;
if(cardTime>20){
cardTime=0;
openCard();
}
}

// 정지
if(cardState){
document.getElementById("bar").style.width =
((cardMax-cardTime)/cardMax*100)+"%";
return;
}

// 탄막
if(spawn%25===0) spawnBullet();

// 이동 제한
clamp();

// 충돌
for(let b of bullets){
b.x+=b.vx;
b.y+=b.vy;

if(Math.hypot(b.x-player.x,b.y-player.y)<10){
player.hp-=10;
}
}

bullets=bullets.filter(b=>b.x>-100&&b.x<c.width+100);
}

// ================= DRAW =================
function draw(){

ctx.clearRect(0,0,c.width,c.height);

// ARENA
ctx.strokeStyle="#00f0ff";
ctx.lineWidth=3;
ctx.strokeRect(ARENA.x,ARENA.y,ARENA.size,ARENA.size);

// PLAYER
ctx.fillStyle="white";
ctx.beginPath();
ctx.arc(player.x,player.y,10,0,Math.PI*2);
ctx.fill();

// BULLETS
ctx.fillStyle="red";
for(let b of bullets){
ctx.beginPath();
ctx.arc(b.x,b.y,b.r,0,Math.PI*2);
ctx.fill();
}
}

// ================= LOOP =================
function loop(){
update();
draw();

document.getElementById("t").innerText=runTime.toFixed(1);

requestAnimationFrame(loop);
}
loop();

</script>

</body>
</html>
