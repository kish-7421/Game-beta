<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Survival Roguelike</title>
<style>
body{margin:0;overflow:hidden;background:black;touch-action:none;}
canvas{display:block;}
#ui{position:fixed;top:0;left:0;color:white;font-family:sans-serif;padding:8px;font-size:13px;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui"></div>

<script>
const c=document.getElementById("c");
const ctx=c.getContext("2d");

function resize(){c.width=innerWidth;c.height=innerHeight;}
resize(); addEventListener("resize",resize);

// ================= PLAYER =================
const player={
x:c.width/2,y:c.height/2,
r:10,
hp:100,maxHp:100,
inv:false
};

// ================= GAME CORE =================
let bullets=[];
let time=0;
let gameOver=false;
let started=false;
let countdown=3;

// ================= SYSTEM STATE =================
let cardUI=false;
let timeStop=false;
let timeStopT=0;
let cardTimer=0;
let cards=[];

// ================= GLOBAL EFFECTS =================
let damageMul=1;
let playerSpeed=1;
let dodgeRate=0;
let slowBullet=false;

// ================= TOUCH CONTROL =================
addEventListener("touchmove",e=>{
let t=e.touches[0];
player.x=t.clientX;
player.y=t.clientY;
});

// ================= BULLET =================
function spawn(){
let s=2+Math.random()*2;
let side=Math.floor(Math.random()*4);
let x,y,vx,vy;

if(side==0){x=0;y=Math.random()*c.height;vx=s;vy=0;}
if(side==1){x=c.width;y=Math.random()*c.height;vx=-s;vy=0;}
if(side==2){x=Math.random()*c.width;y=0;vx=0;vy=s;}
if(side==3){x=Math.random()*c.width;y=c.height;vx=0;vy=-s;}

bullets.push({x,y,vx,vy,r:5,dmg:5});
}

// ================= SPECIAL =================
function special(){
for(let i=0;i<18;i++){
let a=(Math.PI*2/18)*i;
bullets.push({x:c.width/2,y:0,vx:Math.cos(a)*3,vy:Math.sin(a)*3,r:6,dmg:8});
}
}

// ================= CARD SYSTEM (20 TYPES) =================
function createCards(){
let pool=[
{t:"HP20",n:"HP 20% 회복",c:"green"},
{t:"HP40",n:"HP 40% 회복",c:"blue"},
{t:"HP80",n:"HP 80% 회복",c:"purple"},

{t:"DEF10",n:"피해 10% 감소",c:"green"},
{t:"DEF30",n:"피해 30% 감소",c:"blue"},
{t:"DEF50",n:"피해 50% 감소",c:"purple"},

{t:"SHIELD",n:"2초 보호막",c:"blue"},
{t:"REVIVE",n:"부활 30%",c:"purple"},

{t:"SPD",n:"이속 증가",c:"green"},
{t:"SLOW",n:"탄막 속도 감소",c:"blue"},

{t:"DODGE",n:"5% 회피",c:"purple"},
{t:"REGEN",n:"비피격 회복",c:"green"},

{t:"TICK",n:"30초 회복",c:"green"},
{t:"HEAL5",n:"5% 회복",c:"green"},

{t:"BORDER+",n:"경계 확대",c:"blue"},
{t:"BORDER-",n:"경계 축소",c:"purple"},

{t:"ENEMY+",n:"적 속도 증가",c:"purple"},
{t:"DOT",n:"지속 피해",c:"purple"},

{t:"LUCK",n:"회피 확률",c:"blue"},
{t:"BOOST",n:"HP 재생 강화",c:"green"}
];

cards=[];
for(let i=0;i<3;i++){
let r=Math.floor(Math.random()*pool.length);
cards.push(pool[r]);
pool.splice(r,1);
}
}

// ================= APPLY CARD =================
function apply(card){

switch(card.t){

case "HP20": player.hp+=player.maxHp*0.2; break;
case "HP40": player.hp+=player.maxHp*0.4; break;
case "HP80": player.hp+=player.maxHp*0.8; break;

case "DEF10": damageMul=0.9; break;
case "DEF30": damageMul=0.7; break;
case "DEF50": damageMul=0.5; break;

case "SHIELD":
player.inv=true;
setTimeout(()=>player.inv=false,2000);
break;

case "REVIVE":
player.hp=player.maxHp*0.3;
player.inv=true;
setTimeout(()=>player.inv=false,2000);
break;

case "SPD": playerSpeed=1.3; break;
case "SLOW": slowBullet=true; break;

case "DODGE": dodgeRate=0.05; break;

case "REGEN":
setInterval(()=>{if(player.hp>0)player.hp+=1;},1000);
break;

case "TICK":
setInterval(()=>player.hp+=player.maxHp*0.01,30000);
break;

case "HEAL5": player.hp+=player.maxHp*0.05; break;

case "BORDER+": break;
case "BORDER-": break;

case "ENEMY+": break;

case "DOT": break;

case "LUCK": dodgeRate=0.1; break;

case "BOOST":
setInterval(()=>player.hp+=player.maxHp*0.02,1000);
break;
}
}

// ================= TOUCH CARD SELECT =================
addEventListener("touchstart",e=>{
if(!cardUI)return;

let t=e.touches[0];
let x=t.clientX;
let y=t.clientY;

for(let i=0;i<cards.length;i++){
let cx=c.width/2-150+i*150;
let cy=c.height/2;

if(Math.abs(x-cx)<60 && Math.abs(y-cy)<80){
apply(cards[i]);
cardUI=false;
timeStop=false;
}
}
});

// ================= COLLISION =================
function hit(a,b){
return Math.hypot(a.x-b.x,a.y-b.y)<a.r+b.r;
}

// ================= UPDATE =================
function update(){

if(gameOver)return;

// start
if(!started){
countdown-=1/60;
if(countdown<=0)started=true;
return;
}

time+=1/60;

// spawn
if(!timeStop){
if(Math.random()<0.08)spawn();
if(Math.random()<0.02)special();
}

// card system
cardTimer+=1/60;
if(cardTimer>20 && !cardUI){
cardTimer=0;
cardUI=true;
timeStop=true;
timeStopT=10;
createCards();
}

// time stop
if(timeStop){
timeStopT-=1/60;
if(timeStopT<=0){
timeStop=false;
cardUI=false;
}
}

// bullets
bullets.forEach(b=>{
if(!timeStop){
if(slowBullet){b.x+=b.vx*0.5;b.y+=b.vy*0.5;}
else{b.x+=b.vx;b.y+=b.vy;}
}

if(hit(player,b)&&!player.inv){
if(Math.random()>dodgeRate){
player.hp-=b.dmg*damageMul;
}
b.x=-999;
}
});

bullets=bullets.filter(b=>b.x>-100&&b.x<c.width+100);

// regen
player.hp+=0.02;
if(player.hp>player.maxHp)player.hp=player.maxHp;

// death
if(player.hp<=0){
gameOver=true;
}
}

// ================= DRAW =================
function draw(){

ctx.clearRect(0,0,c.width,c.height);

// border
ctx.strokeStyle="blue";
ctx.lineWidth=3;
ctx.strokeRect(10,10,c.width-20,c.height-20);

// player
ctx.fillStyle=player.inv?"cyan":"white";
ctx.beginPath();
ctx.arc(player.x,player.y,player.r,0,Math.PI*2);
ctx.fill();

// bullets
bullets.forEach(b=>{
ctx.fillStyle="orange";
ctx.beginPath();
ctx.arc(b.x,b.y,b.r,0,Math.PI*2);
ctx.fill();
});

// UI
ctx.fillStyle="white";
ctx.fillText("HP:"+player.hp.toFixed(0),10,20);
ctx.fillText("TIME:"+time.toFixed(1),10,40);

// start
if(!started){
ctx.fillText("START:"+Math.ceil(countdown),c.width/2,c.height/2);
}

// card UI
if(cardUI){
ctx.fillStyle="rgba(0,0,0,0.7)";
ctx.fillRect(0,0,c.width,c.height);

ctx.fillStyle="white";
ctx.fillText("CHOOSE CARD",c.width/2-50,c.height/2-100);

for(let i=0;i<cards.length;i++){
let card=cards[i];
let x=c.width/2-150+i*150;
let y=c.height/2;

ctx.fillStyle=card.c;
ctx.fillRect(x-50,y-60,100,120);

ctx.fillStyle="white";
ctx.fillText(card.n,x-45,y);
}
}
}

// ================= LOOP =================
function loop(){
update();
draw();
requestAnimationFrame(loop);
}
loop();
</script>

</body>
</html>
