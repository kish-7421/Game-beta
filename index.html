// =====================
// 캔버스
// =====================

const canvas =
document.getElementById(
"game"
);

const ctx =
canvas.getContext(
"2d"
);

canvas.width = 450;

const WIDTH =

const HEIGHT =

// 게임 상태
// =====================

let countdown = 3;

// 카드창 열리면 true// =====================
// 경기장
// =====================

const arena = {

centerX:
WIDTH / 2,

centerY:
HEIGHT / 2,

w:300,

h:820

};

function getArenaX(){

return (
arena.centerX
-
arena.w/2
);

}

function getArenaY(){

return (
arena.centerY
-
arena.h/2
);

}// =====================
// 플레이어
// =====================

const player = {

x: WIDTH/2,

y: HEIGHT/2,

baseRadius:12,

};// =====================
// 능력치
// =====================

const stats = {

maxHp:100,

hp:100,

damageReduction:0,

enemySpeedMultiplier:1,

dodgeChance:0,

revive:false,

reviveUsed:false,

shieldUnlocked:false,

shieldActive:false,

healCrossUnlocked:false,

slowFieldUnlocked:false,

slowFieldActive:false,

periodicHeal:false,

periodicDamage:false,

passiveHeal:0,

smallMode:false,

smallModeActive:false,

lowHpSlow:false,

lowHpSlowUsed:false

};// =====================
// 오브젝트
// =====================

const bullets = [];

const healCrosses = [];

const allCards = [];

let currentCards = [];// =====================
// 카드 상태
// =====================

let cardMenu = false;

let cardCountdown = 0;// =====================
// 타이머
// =====================

let normalAttackTimer = 0;

let specialAttackTimer = 0;

let cardTimer = 0;

let healCrossTimer = 0;

let shieldTimer = 0;

let slowFieldTimer = 0;// =====================
// 모바일 터치
// =====================

let touchActive = false;

let touchX = 0;

let touchY = 0;// =====================
// 유틸
// =====================

function distance(
x1,
y1,
x2,
y2
){

const dx =
x1 - x2;

const dy =
y1 - y2;

return Math.sqrt(
dx*dx +
dy*dy
);

}

function circleCollision(
a,
b
){

return distance(

a.x,
a.y,

b.x,
b.y

)

<

a.r + b.r;

}// =====================
// 탄 제한
// =====================

function createBullet(
x,
y,
vx,
vy,
r,
color,
damage
){

if(
bullets.length >= 500
){

bullets.shift();

}

bullets.push({

x,
y,

vx,
vy,

r,

color,

damage

});

}// =====================
// 사망 체크
// =====================

function checkDeath(){

if(
stats.hp>0
)
return;

if(
revivePlayer()
)
return;

gameOver=true;

}// =====================
// 피해 처리
// =====================

function damagePlayer(
amount
){

if(
stats.shieldActive
)
return;

if(
Math.random()
<
stats.dodgeChance
)
return;

const finalDamage=

amount*
(
1-
stats.damageReduction
);

stats.hp-=finalDamage;

if(
stats.hp<0
)
stats.hp=0;

}// =====================
// 부활
// =====================

function revivePlayer(){

if(
!stats.revive
)
return false;

if(
stats.reviveUsed
)
return false;

stats.reviveUsed=true;

stats.hp=
stats.maxHp*0.3;

// 부활 시 탄 전부 제거
bullets.length=0;

stats.shieldActive=true;

setTimeout(()=>{

stats.shieldActive=false;

},2000);

return true;

}// =====================
// 사망 체크
// =====================

function checkDeath(){

if(
stats.hp>0
)
return;

if(
revivePlayer()
)
return;

gameOver=true;

}// =====================
// 터치 시작
// =====================

canvas.addEventListener(
"touchstart",
e=>{

const rect=
canvas.getBoundingClientRect();

touchX=
e.touches[0].clientX
-
rect.left;

touchY=
e.touches[0].clientY
-
rect.top;

touchActive=true;

e.preventDefault();

},
{
passive:false
}
);// =====================
// 터치 이동
// =====================

canvas.addEventListener(
"touchmove",
e=>{

const rect=
canvas.getBoundingClientRect();

touchX=
e.touches[0].clientX
-
rect.left;

touchY=
e.touches[0].clientY
-
rect.top;

e.preventDefault();

},
{
passive:false
}
);// =====================
// 터치 종료
// =====================

canvas.addEventListener(
"touchend",
()=>{

touchActive=false;

}
);// =====================
// 플레이어 이동
// =====================

function updatePlayer(){

if(
!touchActive
)
return;

const dx=
touchX-player.x;

const dy=
touchY-player.y;

const dist=
Math.sqrt(
dx*dx+
dy*dy
);

if(
dist<2
)
return;

player.x+=

(dx/dist)
*
player.speed;

player.y+=

(dy/dist)
*
player.speed;

}// =====================
// 벽 충돌
// =====================

function updateArenaCollision(){

const ax=
getArenaX();

const ay=
getArenaY();

if(
player.x-player.r
<
ax
){

player.x=
ax+
player.r;

damagePlayer(
0.03
);

}

if(
player.x+player.r
>
ax+
arena.w
){

player.x=
ax+
arena.w-
player.r;

damagePlayer(
0.03
);

}

if(
player.y-player.r
<
ay
){

player.y=
ay+
player.r;

damagePlayer(
0.03
);

}

if(
player.y+player.r
>
ay+
arena.h
){

player.y=
ay+
arena.h-
player.r;

damagePlayer(
0.03
);

}

}// =====================
// 경기장
// =====================

function drawArena(){

ctx.strokeStyle=
"#3399ff";

ctx.lineWidth=5;

ctx.strokeRect(

getArenaX(),
getArenaY(),

arena.w,
arena.h

);

}// =====================
// 플레이어
// =====================

function drawPlayer(){

ctx.beginPath();

ctx.arc(

player.x,
player.y,

player.r,

0,
Math.PI*2

);

ctx.fillStyle=
"white";

ctx.fill();

}// =====================
// HP 바
// =====================

function drawHpBar(){

ctx.fillStyle=
"#222";

ctx.fillRect(
20,
15,
220,
22
);

ctx.fillStyle=
"lime";

ctx.fillRect(

20,
15,

220*
(
stats.hp/
stats.maxHp
),

22

);

ctx.strokeStyle=
"white";

ctx.strokeRect(
20,
15,
220,
22
);

ctx.fillStyle=
"white";

ctx.font=
"18px Arial";

ctx.fillText(

Math.floor(
stats.hp

+
"/"
+
stats.maxHp,

25,
55

);

}// =====================
// 생존 시간
// =====================

function drawTime(){

ctx.fillStyle=
"white";

ctx.font=
"24px Arial";

ctx.textAlign=
"left";

ctx.fillText(

surviveTime

"s",

350,
35

);

}// =====================
// 카운트다운
// =====================

function drawCountdown(){

ctx.clearRect(
0,
0,
WIDTH,
HEIGHT
);

drawArena();

drawPlayer();

ctx.fillStyle=
"white";

ctx.font=
"100px Arial";

ctx.textAlign=
"center";

ctx.fillText(

countdown,

WIDTH/2,

HEIGHT/2

);

}// =====================
// 카운트다운 시작
// =====================

function startCountdown(){

const timer=

setInterval(()=>{

countdown--;

if(
countdown<=0
){

clearInterval(
timer
);

gameStarted=true;

}

},1000);

}// =====================
// 생존 시간
// =====================

setInterval(()=>{

if(
!gameStarted
)
return;

if(
gameOver
)
return;

if(
gamePaused

return;

surviveTime++;

// 탄 업데이트
// =====================

function updateBullets(){

for(
let i=
bullets.length-1;
i>=0;
i--
){

const b=
bullets[i];

b.x+=
b.vx*
stats.enemySpeedMultiplier;

b.y+=
b.vy*
stats.enemySpeedMultiplier;

if(
circleCollision(
player,
b
)
){

damagePlayer(
b.damage
);

bullets.splice(
i,
1
);

continue;

}

if(

b.x<-100
||
b.x>WIDTH+100
||
b.y<-100
||
b.y>HEIGHT+100

){

bullets.splice(
i,
1
);

}

}

}// =====================
// 탄 그리기
// =====================

function drawBullets(){

for(
const b
of bullets
){

ctx.beginPath();

ctx.arc(

b.x,
b.y,

b.r,

0,
Math.PI*2

);

ctx.fillStyle=
b.color;

ctx.fill();

}

}// =====================
// 플레이어 조준
// =====================

speed,

function getRandomRarity(){

const r=
Math.random()*100;

if(r<65)
return "green";

if(r<85)
return "blue";

if(r<97)
return "purple";

return "penalty";

  }// =====================
// 카드 생성
// =====================

function generateCards(){

currentCards=[];

const available=

allCards.filter(
card=>!card.used
);

// 카드 전부 사용

if(
available.length===0
){

stats.hp=Math.min(
stats.maxHp,
stats.hp+
stats.maxHp*0.3
);

return false;

}

while(
currentCards.length<3
){

const rarity=
getRandomRarity();

const pool=

available.filter(
c=>
c.rarity===rarity
);

if(
pool.length===0
)
continue;

const card=

pool[
Math.floor(
Math.random()
*
pool.length
)
];

if(
!currentCards.includes(card)
){

currentCards.push(card);

}

}

return true;

}// =====================
// 카드 열기
// =====================

function openCardMenu(){

if(
!generateCards()
)
return;

cardMenu=true;

gamePaused=true;

cardCountdown=600;

}// =====================
// 카드 선택
// =====================

function chooseCard(
index
){

const card=
currentCards[index];

if(
!card
)
return;

card.used=true;

card.effect();

cardMenu=false;

gamePaused=false;

}// =====================
// 카드 타이머
// =====================

function updateCardTimer(){

cardTimer++;

if(
cardTimer<1200
)
return;

cardTimer=0;

openCardMenu();

}// =====================
// 카드 자동선택
// =====================

function updateCardMenu(){

if(
!cardMenu
)
return;

cardCountdown--;

if(
cardCountdown>0
)
return;

chooseCard(

Math.floor(
Math.random()
*
currentCards.length
)

);

}// =====================
// 모바일 카드 선택
// =====================

canvas.addEventListener(
"touchstart",
e=>{

if(
!cardMenu
)
return;

const rect=
canvas.getBoundingClientRect();

const x=
e.touches[0].clientX
-
rect.left;

const y=
e.touches[0].clientY
-
rect.top;

for(
let i=0;
i<currentCards.length;
i++
){

const cardX=
25+i*140;

if(

x>cardX
&&
x<cardX+120

&&

y>250
&&
y<450

){

chooseCard(i);

}

}

},
{
passive:false
}

!cardMenu

"center";

);

"28px Arial";

),

140

let i=0;
i<currentCards.length;
i++

currentCards[i];

if(card.rarity==="blue")
color="dodgerblue";

if(card.rarity==="purple")

if(card.rarity==="penalty")

25+i*140;

color;

x,
250,
120,
200
);

card.name,
x+60,
350

}// =====================

function spawnHealCross(){

healCrosses.push({

x:
getArenaX()+30+
Math.random()*
(arena.w-60),

y:
getArenaY()+30+
Math.random()*
(arena.h-60),

r:15,

life:600

});

}// =====================
// 힐 십자가 업데이트
// =====================

function updateHealCrosses(){

for(
let i=
healCrosses.length-1;
i>=0;
i--
){

const h=
healCrosses[i];

h.life--;

if(
circleCollision(
player,
h
)
){

stats.hp=
Math.min(

stats.maxHp,

stats.hp+
stats.maxHp*0.1

);

healCrosses.splice(
i,
1
);

continue;

}

if(
h.life<=0
){

healCrosses.splice(
i,
1
);

}

}

}// =====================
// 힐 십자가 그리기
// =====================

function drawHealCrosses(){

for(
const h
of healCrosses
){

ctx.fillStyle=
"#66ff66";

ctx.fillRect(
h.x-4,
h.y-14,
8,
28
);

ctx.fillRect(
h.x-14,
h.y-4,
28,
8
);

}

}// =====================
// 보호막
// =====================

let shieldDuration=0;

function updateShield(){

if(
!stats.shieldUnlocked
)
return;

if(
shieldDuration>0
){

shieldDuration--;

if(
shieldDuration<=0
){

stats.shieldActive=false;

}

return;

}

shieldTimer++;

if(
shieldTimer>=1800
){

shieldTimer=0;

stats.shieldActive=true;

shieldDuration=120;

}

}// =====================
// 보호막 표시
// =====================

function drawShield(){

if(
!stats.shieldActive
)
return;

ctx.beginPath();

ctx.arc(

player.x,
player.y,

player.r+12,

0,
Math.PI*2

);

ctx.strokeStyle=
"#66ffff";

ctx.lineWidth=4;

ctx.stroke();

}// =====================
// 슬로우 필드
// =====================

let slowFieldDuration=0;

function updateSlowField(){

if(
!stats.slowFieldUnlocked
)
return;

if(
slowFieldDuration>0
){

slowFieldDuration--;

if(
slowFieldDuration<=0
){

stats.slowFieldActive=false;

}

return;

}

slowFieldTimer++;

if(
slowFieldTimer>=2400
){

slowFieldTimer=0;

stats.slowFieldActive=true;

slowFieldDuration=300;

}

}// =====================
// 슬로우 필드 적용
// =====================

function applySlowField(){

if(
!stats.slowFieldActive
)
return;

for(
const b
of bullets
){

const dist=

distance(

player.x,
player.y,

b.x,
b.y

);

if(
dist<90
){

b.x-=
b.vx*0.3;

b.y-=
b.vy*0.3;

}

}

}// =====================
// 슬로우 필드 표시
// =====================

function drawSlowField(){

if(
!stats.slowFieldActive
)
return;

ctx.beginPath();

ctx.arc(

player.x,
player.y,

90,

0,
Math.PI*2

);

ctx.fillStyle=
"rgba(0,255,255,0.15)";

ctx.fill();

}// =====================
// 지속 회복
// =====================

function updatePassiveHeal(){

if(
stats.passiveHeal<=0
)
return;

stats.hp=
Math.min(

stats.maxHp,

stats.hp+
stats.maxHp*
stats.passiveHeal

);

}// =====================
// 주기 회복
// =====================

function updatePeriodicHeal(){

if(
!stats.periodicHeal
)
return;

if(
frame%1800===0
){

stats.hp=
Math.min(

stats.maxHp,

stats.hp+
stats.maxHp*0.05

);

}

}// =====================
// 주기 피해
// =====================

function updatePeriodicDamage(){

if(
!stats.periodicDamage
)
return;

if(
frame%1800===0
){

stats.hp-=
stats.maxHp*0.05;

}

}// =====================
// 크기 감소
// 중첩 방지 버전
// =====================

let smallModeDuration=0;

function updateSmallMode(){

if(
!stats.smallMode
)
return;

if(
smallModeDuration>0
){

smallModeDuration--;

if(
smallModeDuration<=0
){

player.r=
player.baseRadius;

}

return;

}

if(
frame%1800===0
){

player.r=
player.baseRadius*
0.95;

smallModeDuration=
180;

}

}// =====================
// HP 5% 이하 슬로우
// =====================

let lowHpSlowDuration=0;

function updateLowHpSlow(){

if(
!stats.lowHpSlow
)
return;

if(
lowHpSlowDuration>0
){

lowHpSlowDuration--;

if(
lowHpSlowDuration<=0
){

stats.enemySpeedMultiplier/=0.5;

}

return;

}

if(
stats.hp
<=
stats.maxHp*0.05
){

lowHpSlowDuration=
300;

stats.enemySpeedMultiplier*=0.5;

}

}// =====================
// 힐 십자가 생성
// =====================

function updateHealCrossSpawn(){

if(
!stats.healCrossUnlocked
)
return;

healCrossTimer++;

if(
healCrossTimer>=600
){

healCrossTimer=0;

spawnHealCross();

}

}// =====================
// 카드 효과 통합
// =====================

function updateCardEffects(){

updateShield();

updateSlowField();

applySlowField();

updatePassiveHeal();

updatePeriodicHeal();

updatePeriodicDamage();

updateSmallMode();

updateLowHpSlow();

updateHealCrossSpawn();

}// =====================
// 게임 오브젝트 그리기
// =====================

function drawGameObjects(){

drawArena();

drawSlowField();

drawHealCrosses();

drawBullets();

drawPlayer();

drawShield();

drawHpBar();

drawTime();

}// =====================
// 게임 업데이트
// =====================

function update(){

if(
gameOver
)
return;

// 카드창 열리면
// 게임 전체 정지

if(
gamePaused
){

updateCardMenu();

return;

}

updatePlayer();

updateArenaCollision();

updateBullets();

updateHealCrosses();

updateCardEffects();

updateNormalAttacks();

updateSpecialAttacks();

updateCardTimer();

checkDeath();

frame++;

}// =====================
// 게임 렌더링
// =====================

function render(){

ctx.clearRect(
0,
0,
WIDTH,
HEIGHT
);

drawGameObjects();

drawCardMenu();

}// =====================
// 게임오버
// =====================

if(
!gameOver
)
return;

ctx.fillStyle=
"rgba(0,0,0,0.85)";

ctx.fillRect(
0,
0,
WIDTH,
HEIGHT
);

ctx.fillStyle=
"red";

ctx.font=
"60px Arial";

ctx.textAlign=
"center";

ctx.fillText(

"GAME OVER",

WIDTH/2,

HEIGHT/2

);

ctx.fillStyle=
"white";

ctx.font=
"26px Arial";

ctx.fillText(

"생존 시간 : "
+
surviveTime
+
"초",

WIDTH/2,

HEIGHT/2+70

);

}// =====================
// 메인 루프
// =====================

function gameLoop(){

if(
!gameStarted
){

drawCountdown();

requestAnimationFrame(
gameLoop
);

return;

}

update();

render();

drawGameOver();

requestAnimationFrame(
gameLoop
);

}// =====================
// 시작
// =====================

startCountdown();

gameLoop();
