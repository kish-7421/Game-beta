// =====================
// 거리

function distance(
x1,y1,
x2,y2
){

const dx=x1-x2;
const dy=y1-y2;

return Math.sqrt(
dx*dx+
dy*dy
);

}

function circleCollision(
a,
b
){

return distance(

a.x,
a.y,

b.x,
b.y

)

<

a.r+b.r;

}// =====================
// 플레이어 이동
// =====================

function updatePlayer(){

if(keys["w"])
player.y-=player.speed;

if(keys["s"])
player.y+=player.speed;

if(keys["a"])
player.x-=player.speed;

if(keys["d"])
player.x+=player.speed;

// 벽 충돌

player.x-player.r
<
arena.x
){

player.x=
arena.x+
player.r;

damagePlayer(
0.03
);

}

player.x+player.r
>
arena.x+
arena.w
){

player.x=
arena.x+
arena.w-
player.r;

damagePlayer(
0.03
);

}

if(
player.y-player.r
<
arena.y
){

player.y=
arena.y+
player.r;

damagePlayer(
0.03
);

}

if(
player.y+player.r
>
arena.y+
arena.h
){

player.y=
arena.y+
arena.h-
player.r;

damagePlayer(
0.03
);

}

// 피해
// =====================

Date.now();

amount
){

Date.now();

Math.random()
<
dodgeChance
)
return;

if(
invincible
)
return;

if(
shieldActive
)
return;

hp-=
amount*
damageMultiplier;

if(
hp<0
)
hp=0;

}// =====================
// 부활
// =====================

if(
hp>0
)
return;

reviveUnlocked

&&

!reviveUsed

){

reviveUsed=true;

hp=maxHp*0.3;

invincible=true;

setTimeout(()=>{

invincible=false;

},2000);

return;

}

gameOver=true;

player.y,

player.r+18,

Math.PI*2

"#66ffff";

// =====================

// =====================

player.y,

player.r,

0,
Math.PI*2

"white";

function createBullet(
x,
y,
vx,
vy,
r,
color,
damage
){

bullets.push({

x,
y,

vx,
vy,

r,

color,

damage

});

}

function shootAtPlayer(
x,
y,
speed,
size,
color,
damage
){

const angle=
Math.atan2(

player.y-y,

player.x-x

);

createBullet(

x,
y,

Math.cos(angle)*speed,

Math.sin(angle)*speed,

size,

color,

damage

);

}// =====================
// 탄 업데이트
// =====================

function updateBullets(){

for(
let i=
bullets.length-1;
i>=0;
i--
){

const b=
bullets[i];

b.x+=
b.vx*
enemySpeedMultiplier;

b.y+=
b.vy*
enemySpeedMultiplier;

if(
circleCollision(
player,
b
)
){

damagePlayer(
b.damage
);

bullets.splice(
i,
1
);

continue;

}

if(

b.x<-300 ||

b.x>WIDTH+300 ||

b.y<-300 ||

b.y>HEIGHT+300

){

bullets.splice(
i,
1
);

}

}

}// =====================
// 탄 그리기
// =====================

function drawBullets(){

for(
const b
of bullets
){

ctx.beginPath();

ctx.arc(

b.x,
b.y,

b.r,

0,
Math.PI*2

);

ctx.fillStyle=
b.color;

ctx.fill();

}

// 카드 등급 확률
// =====================

function randomRarity(){

const r=
Math.random()*100;

if(r<70)
return "green";

if(r<92)
return "blue";

if(r<99)
return "purple";

return "penalty";

}// =====================
// 카드 생성
// =====================

function generateCards(){

currentCards=[];

const available=

cards.filter(
c=>!c.used
);

// 패널티 1%

const penalties=

available.filter(
c=>c.rarity==="penalty"
);

if(

penalties.length>0
&&
Math.random()<0.01

){

currentCards.push(

penalties[
Math.floor(
Math.random()*
penalties.length
)
]

);

return;

}

while(
currentCards.length<3
){

const rarity=
randomRarity();

const pool=

available.filter(
c=>
c.rarity===rarity
);

if(
pool.length===0
)
continue;

const card=

pool[
Math.floor(
Math.random()*
pool.length
)
];

if(
!currentCards.includes(card)
){

currentCards.push(card);

}

}

}// =====================
// 카드 선택
// =====================

function chooseCard(
index
){

if(
index<0
||
index>=currentCards.length
)
return;

const card=
currentCards[index];

card.used=true;

card.effect();

cardMenu=false;

}// =====================
// 카드창 열기
// =====================

function openCardMenu(){

cardMenu=true;

cardCountdown=10;

generateCards();

}

openCardMenu();

if(

currentCards.length
)

}

);

ctx.fillText(
cardCountdown,
WIDTH/2,
160
);

for(
let i=0;
i<currentCards.length;
i++
){

const card=
currentCards[i];

let color=
"green";

if(
card.rarity==="blue"
)
color=
"dodgerblue";

if(
card.rarity==="purple"
)
color=
"purple";

if(
card.rarity==="penalty"
)
color=
"red";

const x=
150+
i*300;

ctx.fillStyle=
color;

ctx.fillRect(
x,
250,
220,
200
);

ctx.fillStyle=
"white";

ctx.font=
"20px Arial";

ctx.fillText(
card.name,
x+15,
350
);

}

  }// =====================
// 카드 클릭
// =====================

canvas.addEventListener(
"click",
e=>{

if(
!cardMenu
)
return;

const rect=
canvas.getBoundingClientRect();

const mx=
e.clientX-
rect.left;

const my=
e.clientY-
rect.top;

for(
let i=0;
i<currentCards.length;
i++
){

const x=
150+
i*300;

if(

mx>x
&&
mx<x+220

&&

my>250
&&
my<450

){

chooseCard(i);

}

}

});// =====================
// 힐 십자가
// =====================

function spawnHealCross(){

healCrosses.push({

x:
arena.x+
50+
Math.random()*
(arena.w-100),

y:
arena.y+
50+
Math.random()*
(arena.h-100),

r:18,

life:10000

});

}

setInterval(()=>{

if(
gameOver
||
!gameStarted
||
!healCrossUnlocked
)
return;

spawnHealCross();

},10000);// =====================
// 힐 십자가 업데이트
// =====================

function updateHealCrosses(){

for(
let i=
healCrosses.length-1;
i>=0;
i--
){

const h=
healCrosses[i];

h.life-=16;

if(
circleCollision(
player,
h
)
){

hp=
Math.min(
maxHp,
hp+
maxHp*0.1
);

healCrosses.splice(
i,
1
);

continue;

}

if(
h.life<=0
){

healCrosses.splice(
i,
1
);

}

}

  }// =====================
// 힐 십자가 그리기
// =====================

function drawHealCrosses(){

for(
const h
of healCrosses
){

ctx.fillStyle=
"#66ff66";

ctx.fillRect(
h.x-4,
h.y-15,
8,
30
);

ctx.fillRect(
h.x-15,
h.y-4,
30,
8
);

}

}// =====================
// 지속 회복
// =====================

setInterval(()=>{

if(
gameOver
||
!gameStarted
)
return;

const elapsed=

Date.now()
-
lastHitTime;

if(
elapsed<1000
)
return;

if(
passiveHealGreen
){

hp=
Math.min(
maxHp,
hp+
maxHp*0.0001
);

}

if(
passiveHealBlue
){

hp=
Math.min(
maxHp,
hp+
maxHp*0.0003
);

}

if(
passiveHealPurple
){

hp=
Math.min(
maxHp,
hp+
maxHp*0.0007
);

}

},100);// =====================
// 슬로우 필드
// =====================

setInterval(()=>{

if(
!slowFieldUnlocked
||
gameOver
)
return;

slowFieldActive=true;

setTimeout(()=>{

slowFieldActive=false;

},5000);

},40000);

function drawSlowField(){

if(
!slowFieldActive
)
return;

ctx.beginPath();

ctx.arc(

player.x,
player.y,

80,

0,
Math.PI*2

);

ctx.fillStyle=
"rgba(0,255,255,0.15)";

ctx.fill();

}// =====================
// 슬로우 필드 효과
// =====================

function applySlowField(){

if(
!slowFieldActive
)
return;

for(
const b
of bullets
){

const dx=
b.x-player.x;

const dy=
b.y-player.y;

const dist=
Math.sqrt(
dx*dx+
dy*dy
);

if(
dist<80
){

b.x-=
b.vx*0.2;

b.y-=
b.vy*0.2;

}

}

}// =====================
// 추가 카드
// =====================

cards.push({

name:"힐 십자가",

rarity:"blue",

used:false,

effect:()=>{

healCrossUnlocked=true;

}

});

cards.push({

name:"지속회복 0.03%",

rarity:"blue",

used:false,

effect:()=>{

passiveHealBlue=true;

}

});

cards.push({

name:"슬로우 필드",

rarity:"green",

used:false,

effect:()=>{

slowFieldUnlocked=true;

}

});

cards.push({

name:"맵 2% 증가",

rarity:"green",

used:false,

effect:()=>{

arena.w*=1.02;
arena.h*=1.02;

}

});

cards.push({

name:"맵 5% 증가",

rarity:"blue",

used:false,

effect:()=>{

arena.w*=1.05;
arena.h*=1.05;

}

});

cards.push({

name:"피해량 30% 감소",

rarity:"purple",

used:false,

effect:()=>{

damageMultiplier*=0.7;

}

});// =====================
// 패널티 카드
// =====================

cards.push({

name:"맵 10% 감소",

rarity:"penalty",

used:false,

effect:()=>{

arena.w*=0.9;
arena.h*=0.9;

}

});

cards.push({

name:"30초마다 HP 감소",

rarity:"penalty",

used:false,

effect:()=>{

setInterval(()=>{

if(gameOver)
return;

hp-=
maxHp*0.05;

},30000);

}

});// =====================
// 카드 전부 획득
// =====================

function checkAllCardsUsed(){

const remain=

cards.filter(
c=>
!c.used
&&
c.rarity!=="penalty"
);

if(
remain.length!==0
)
return;

hp=
Math.min(

maxHp,

hp+
maxHp*0.3

);

for(
const c
of cards
){

if(
c.rarity!=="penalty"
)
c.used=false;

}

}

setInterval(
checkAllCardsUsed,
1000
);// =====================
// 스킬 업데이트
// =====================

function updateSkills(){

applySlowField();

handleRevive();

}// =====================
// 게임 오브젝트 그리기
// =====================

function drawGameObjects(){

drawArena();

drawBullets();

drawHealCrosses();

drawPlayer();

drawShield();

drawHpBar();

drawTime();

}// =====================
// 업데이트
// =====================

function update(){

if(
gameOver
)
return;

if(
!cardMenu
){

updatePlayer();

updateBullets();

updateHealCrosses();

updateSkills();

}

frame++;

}// =====================
// 렌더링
// =====================

function render(){

ctx.clearRect(
0,
0,
WIDTH,
HEIGHT
);

drawGameObjects();

drawSlowField();

drawCardMenu();

}// =====================
// GAME OVER
// =====================

function drawGameOver(){

if(
!gameOver
)
return;

ctx.fillStyle=
"rgba(0,0,0,0.8)";

ctx.fillRect(
0,
0,
WIDTH,
HEIGHT
);

ctx.fillStyle=
"red";

ctx.font=
"80px Arial";

ctx.textAlign=
"center";

ctx.fillText(

"GAME OVER",

WIDTH/2,

HEIGHT/2

);

ctx.fillStyle=
"white";

ctx.font=
"32px Arial";

ctx.fillText(

"생존 시간 : "
+
surviveTime
+
"초",

WIDTH/2,

HEIGHT/2+80

);

}// =====================
// 메인 루프
// =====================

function gameLoop(){

update();

render();

drawGameOver();

requestAnimationFrame(
gameLoop
);

}// =====================
// 시작 카운트다운
// =====================

let startCountdown=3;

function drawCountdown(){

ctx.clearRect(
0,
0,
WIDTH,
HEIGHT
);

drawArena();

drawPlayer();

ctx.fillStyle=
"white";

ctx.font=
"100px Arial";

ctx.textAlign=
"center";

ctx.fillText(

startCountdown,

WIDTH/2,

HEIGHT/2

);

  }// =====================
// 카운트다운 시작
// =====================

const countdownLoop=

setInterval(()=>{

startCountdown--;

if(
startCountdown<=0
){

clearInterval(
countdownLoop
);

gameStarted=true;

gameLoop();

}

},1000);// =====================
// 대기 루프
// =====================

function waitingLoop(){

if(
gameStarted
)
return;

drawCountdown();

requestAnimationFrame(
waitingLoop
);

}

waitingLoop();</script>
