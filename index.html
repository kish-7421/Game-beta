<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Stable Game</title>

<style>
body{margin:0;overflow:hidden;background:black;}
canvas{display:block;}
</style>
</head>

<body>
<canvas id="c"></canvas>

<script>
window.onload = function(){

const c=document.getElementById("c");
const ctx=c.getContext("2d");

// ================= SAFE RESIZE FIRST =================
function resize(){
c.width=window.innerWidth;
c.height=window.innerHeight;

player.x=c.width/2;
player.y=c.height/2;
}
window.addEventListener("resize",resize);

// ================= PLAYER (AFTER CANVAS READY) =================
let player={
x:0,y:0,
r:10,
hp:100,
maxHp:100
};

// NOW SAFE INIT
resize();

// ================= GAME =================
let bullets=[];
let time=0;

// ================= TOUCH =================
window.addEventListener("touchmove",e=>{
let t=e.touches[0];
player.x=t.clientX;
player.y=t.clientY;
});

// ================= BULLET =================
function spawn(){
let s=2+Math.random()*2;
bullets.push({
x:Math.random()*c.width,
y:0,
vx:0,
vy:s,
r:5,
dmg:5
});
}

// ================= HIT =================
function hit(a,b){
return Math.hypot(a.x-b.x,a.y-b.y)<a.r+b.r;
}

// ================= UPDATE =================
function update(){

time++;

if(Math.random()<0.1)spawn();

bullets.forEach(b=>{
b.y+=b.vy;

if(hit(player,b)){
player.hp-=b.dmg;
b.x=-999;
}
});

bullets=bullets.filter(b=>b.y<c.height+100);

if(player.hp<=0){
alert("GAME OVER");
}
}

// ================= DRAW =================
function draw(){

ctx.clearRect(0,0,c.width,c.height);
ctx.font="16px Arial";

// player
ctx.fillStyle="white";
ctx.beginPath();
ctx.arc(player.x,player.y,player.r,0,Math.PI*2);
ctx.fill();

// bullets
ctx.fillStyle="orange";
bullets.forEach(b=>{
ctx.beginPath();
ctx.arc(b.x,b.y,b.r,0,Math.PI*2);
ctx.fill();
});

ctx.fillStyle="white";
ctx.fillText("HP:"+player.hp,10,20);
}

// ================= LOOP =================
function loop(){
update();
draw();
requestAnimationFrame(loop);
}
loop();

};
</script>

</body>
</html>
